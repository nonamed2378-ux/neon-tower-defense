            enemies.splice(i, 1);
            continue;
        }
        // Despawn at right edge - no damage, damage only from overflow
        if (e.x >= laneEndX) {
            enemies.splice(i, 1);
            continue;
        }
    }

    // Wave phase timer and overflow system
    if (waveActive) {
        // Phase timer countdown
        wavePhaseTimer -= dt;
        if (wavePhaseTimer <= 0 && stageMode && currentStage) {
            wavePhaseTimer = 60;
            if (wave < currentStage.waves) {
                advanceToNextWavePhase();
            }
        }
        // Continuous spawning during wave phase
        wavePhaseSpawnTimer -= dt;
        if (wavePhaseSpawnTimer <= 0 && enemies.length < 150) {
            wavePhaseSpawnTimer = wavePhaseSpawnRate + (Math.random() * 0.4 - 0.2);
            if (enemiesToSpawn.length > 0) {
                spawnEnemy(enemiesToSpawn.shift());
            } else {
                // Spawn random enemies from current wave type
                spawnEnemy(getWavePhaseEnemyType());
            }
        }
        // Overflow HP drain check
        if (enemies.length >= OVERFLOW_LIMIT) {
            overflowTimer += dt;
            if (overflowTimer >= OVERFLOW_DRAIN_INTERVAL) {
                overflowTimer -= OVERFLOW_DRAIN_INTERVAL;
                hp--;
                showToast('적 과다! HP -1', 1000);
                if (hp <= 0) { hp = 0; gameOver = true; }
            }
        } else {
            overflowTimer = 0;
        }
    }

    // Wave/stage complete check
    if (waveActive && stageMode && currentStage && wave >= currentStage.waves && enemies.length === 0 && enemiesToSpawn.length === 0) {
        // All waves done and all enemies dead - stage clear
        waveActive = false;
        let waveReward = 30 + wave * 10;
        sp += waveReward;
        showToast('스테이지 클리어!', 2000);
        setTimeout(function() { onStageClear(); }, 1500);
    } else if (waveActive && !stageMode && enemiesToSpawn.length === 0 && enemies.length === 0) {
        // Legacy infinite mode: wave complete
        waveActive = false;
        let waveReward = 30 + wave * 10;
        sp += waveReward;
        showToast('웨이브 ' + wave + ' 클리어! +' + waveReward + ' 에너지');
    }

    // (Auto-wave timer no longer needed - wave phases are continuous)

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.95; p.vy *= 0.95;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // UI
    document.getElementById('summonBtn').disabled = sp < SUMMON_COST || gameOver;
    if (isMultiplayer && !isHost) {
        document.getElementById('startWaveBtn').disabled = true;
    } else {
        document.getElementById('startWaveBtn').disabled = waveActive || gameOver;
    }

    // Synergy bar
    let roleKR = {PHYSICAL:'물리',MAGIC:'마법',SPLASH:'범위',SUPPORT:'지원',ECONOMY:'경제',SPECIAL:'특수',LEGENDARY:'전설'};
    let synText = '';
    let parts = [];
    for (let r in synergies) {
        parts.push((roleKR[r]||r) + ' +' + Math.round(synergies[r]*100) + '%');
    }
    synText = parts.join('  \u00B7  ');
    document.getElementById('synergyBar').textContent = synText ? '\u26A1 시너지 활성: ' + synText : '';

    // Update recipe panel periodically
    updateRecipePanel();
}

// ── Draw ──
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background with gradient
    let bgGrd = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrd.addColorStop(0, '#050518');
    bgGrd.addColorStop(0.5, '#0a0a2e');
    bgGrd.addColorStop(1, '#0d0820');
    ctx.fillStyle = bgGrd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Background stars
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 40; i++) {
        let sx = ((i * 137 + 50) % canvas.width);
        let sy = ((i * 97 + 30) % canvas.height);
        let twinkle = 0.2 + Math.sin(Date.now() / 1000 + i * 0.7) * 0.15;
        ctx.globalAlpha = twinkle;
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1.0;

    // Grid background panel
    ctx.fillStyle = '#08082288';
    ctx.strokeStyle = '#1a1a5588';
    ctx.lineWidth = 1;
    let gpx = GRID_X - 10, gpy = GRID_Y - 25;
    let gpw = COLS * CELL_W + 20, gph = ROWS * CELL_H + 55;
    ctx.fillRect(gpx, gpy, gpw, gph);
    ctx.strokeRect(gpx, gpy, gpw, gph);

    // Corner accents on grid panel
    let cornerLen = 15;
    ctx.strokeStyle = '#00ffff66';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(gpx, gpy + cornerLen); ctx.lineTo(gpx, gpy); ctx.lineTo(gpx + cornerLen, gpy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gpx+gpw-cornerLen, gpy); ctx.lineTo(gpx+gpw, gpy); ctx.lineTo(gpx+gpw, gpy+cornerLen); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gpx, gpy+gph-cornerLen); ctx.lineTo(gpx, gpy+gph); ctx.lineTo(gpx+cornerLen, gpy+gph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gpx+gpw-cornerLen, gpy+gph); ctx.lineTo(gpx+gpw, gpy+gph); ctx.lineTo(gpx+gpw, gpy+gph-cornerLen); ctx.stroke();

    // Lane glow effect (animated)
    let laneY = GRID_Y + LANE_ROW * CELL_H;
    let laneGrd = ctx.createLinearGradient(GRID_X, laneY, GRID_X + COLS * CELL_W, laneY);
    let lanePhase = (Date.now() / 2000) % 1;
    laneGrd.addColorStop(Math.max(0, lanePhase - 0.1), '#6600cc00');
    laneGrd.addColorStop(lanePhase, '#6600cc44');
    laneGrd.addColorStop(Math.min(1, lanePhase + 0.1), '#6600cc00');
    ctx.fillStyle = laneGrd;
    ctx.fillRect(GRID_X, laneY, COLS * CELL_W, CELL_H);

    // Grid cells
    for (let x = 0; x < COLS; x++) for (let y = 0; y < ROWS; y++) {
        let px = GRID_X + x * CELL_W, py = GRID_Y + y * CELL_H;
        ctx.fillStyle = y === LANE_ROW ? '#1a0a3e' : '#0d0d35';
        ctx.fillRect(px + 1, py + 1, CELL_W - 2, CELL_H - 2);
        ctx.strokeStyle = y === LANE_ROW ? '#4400aa' : getZoneColor(x, y);
        ctx.lineWidth = y === LANE_ROW ? 1 : 2;
        ctx.globalAlpha = y === LANE_ROW ? 0.5 : 0.7;
        ctx.strokeRect(px + 1, py + 1, CELL_W - 2, CELL_H - 2);
        ctx.globalAlpha = 1.0;
    }

    // Lane label
    ctx.fillStyle = '#6600cc';
    ctx.font = '14px DungGeunMo, Press Start 2P, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('\u25C0\u2550\u2550 \uC801 \uC774\uB3D9 \uB808\uC778 (100\uB9C8\uB9AC \uCD08\uACFC \uC2DC HP \uAC10\uC18C) \u2550\u2550\u25B6', GRID_X + COLS * CELL_W / 2, GRID_Y + LANE_ROW * CELL_H + CELL_H / 2 + 5);

    // Zone labels (상/하 분할)
    ctx.font = '12px DungGeunMo, Press Start 2P, monospace';
    ctx.textAlign = 'left';
    if (isMultiplayer) {
        let p1Label = isHost ? playerName : opponentName;
        let p2Label = isHost ? opponentName : playerName;
        if (!p1Label) p1Label = 'P1';
        if (!p2Label) p2Label = 'P2';
        ctx.fillStyle = '#00ffff';
        ctx.fillText('\u25B2 ' + p1Label + ' (\uD638\uC2A4\uD2B8)', GRID_X, GRID_Y - 8);
        ctx.fillStyle = '#ff00ff';
        ctx.fillText('\u25BC ' + p2Label + ' (\uAC8C\uC2A4\uD2B8)', GRID_X, GRID_Y + ROWS * CELL_H + 16);
    } else {
        ctx.fillStyle = '#00ffff';
        ctx.fillText('\u25B2 \uB0B4 \uC601\uC5ED (\uC704)', GRID_X, GRID_Y - 8);
        ctx.fillStyle = '#ff00ff';
        ctx.fillText('\u25BC \uC0C1\uB300 \uC601\uC5ED (\uC544\uB798) - \uBA40\uD2F0\uC5D0\uC11C \uC0AC\uC6A9', GRID_X, GRID_Y + ROWS * CELL_H + 16);
    }

    // Towers - pixel art rendering
    for (let x = 0; x < COLS; x++) for (let y = 0; y < ROWS; y++) {
        let t = grid[x][y];
        if (!t) continue;
        let pos = gridToWorld(x, y);
        let isSelected = selectedCell && selectedCell.x === x && selectedCell.y === y;
        let isHidden = t.def.hidden;

        // Pixel size scales with grade (for normal towers 1-3)
        let pixelSize;
        if (isHidden) {
            pixelSize = 5; // Hidden characters are always big
        } else {
            pixelSize = 2 + t.grade; // 3 for 1★, 4 for 2★, 5 for 3★
        }

        // Neon glow behind character
        let glowRadius = pixelSize * 6;
        let grd = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowRadius);
        grd.addColorStop(0, t.def.color + '55');
        grd.addColorStop(0.5, t.def.color + '22');
        grd.addColorStop(1, t.def.color + '00');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, glowRadius, 0, Math.PI * 2);
        ctx.fill();

        // Selection pulsing glow
        if (isSelected) {
            let pulse = 0.3 + Math.sin(Date.now() / 300) * 0.15;
            let selGrd = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowRadius + 10);
            selGrd.addColorStop(0, t.def.color + '00');
            selGrd.addColorStop(0.7, t.def.color + Math.round(pulse * 255).toString(16).padStart(2, '0'));
            selGrd.addColorStop(1, t.def.color + '00');
            ctx.fillStyle = selGrd;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, glowRadius + 10, 0, Math.PI * 2);
            ctx.fill();
        }

        // Range indicator when selected
        if (isSelected && t.def.range > 0) {
            let lvlR = t.level || 1;
            let rangeVal = isHidden ? t.def.range * (1 + (lvlR-1)*0.10) : t.def.range * (1 + (t.grade-1)*0.05) * (1 + (lvlR-1)*0.10);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, rangeVal, 0, Math.PI * 2);
            ctx.strokeStyle = t.def.color + '33';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Draw pixel art character
        let pixelData = PIXEL_ART[t.type];
        // Attack animation offset
        let animOff = 0;
        if (t.attackAnim > 0) {
            animOff = Math.sin(t.attackAnim * Math.PI / 0.2) * 3;
        }
        if (pixelData) {
            drawPixelArt(ctx, pixelData, pos.x, pos.y - 4 + (t.type === 'cannon' ? animOff : 0), pixelSize, t.def.color);
        } else {
            // Fallback: draw a simple shape
            ctx.fillStyle = t.def.color;
            ctx.fillRect(pos.x - 10, pos.y - 10, 20, 20);
        }

        // Per-tower attack visual effects
        if (t.attackAnim > 0) {
            let aRatio = t.attackAnim / 0.2;
            ctx.save();
            switch(t.type) {
                case 'archer':
                case 'shingoong':
                    // Pullback release
                    ctx.strokeStyle = t.def.color + '88';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(pos.x + 8, pos.y - 4, 4 * (1 - aRatio), -0.5, 0.5);
                    ctx.stroke();
                    break;
                case 'blade':
                case 'noishin':
                    // Quick slash arc
                    ctx.strokeStyle = '#ccddff';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = aRatio;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y - 4, 18, -Math.PI * aRatio, Math.PI * (1-aRatio));
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                    break;
                case 'gunner':
                case 'geumgang':
                    // Muzzle flash
                    if (aRatio > 0.5) {
                        ctx.fillStyle = '#ffaa00';
                        ctx.globalAlpha = (aRatio - 0.5) * 2;
                        ctx.beginPath();
                        ctx.arc(pos.x + 12, pos.y - 4, 5 * aRatio, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                    break;
                case 'mage':
                case 'yuryeong':
                    // Orbiting particle speedup
                    ctx.strokeStyle = t.def.color + '66';
                    ctx.lineWidth = 1;
                    let mAngle = Date.now() / 100 * (1 + (1-aRatio) * 3);
                    ctx.beginPath();
                    ctx.arc(pos.x + Math.cos(mAngle) * 14, pos.y - 4 + Math.sin(mAngle) * 14, 2, 0, Math.PI * 2);
                    ctx.fillStyle = t.def.color;
                    ctx.fill();
                    break;
                case 'lightning':
                    // Brief bright glow
                    ctx.fillStyle = '#ffff00';
                    ctx.globalAlpha = aRatio * 0.4;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y - 4, 20, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                    break;
                case 'cannon':
                    // Recoil handled above via animOff
                    // Smoke puff
                    if (aRatio > 0.6) {
                        ctx.fillStyle = '#88888844';
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y - 20, 6 * (1 - aRatio) * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
                case 'frost':
                case 'bingpok':
                    // Ice crystal rotation
                    ctx.strokeStyle = '#88ccff66';
                    ctx.lineWidth = 1;
                    let iceAngle = Date.now() / 150;
                    for (let ri = 0; ri < 3; ri++) {
                        let ra = iceAngle + ri * Math.PI * 2 / 3;
                        ctx.beginPath();
                        ctx.moveTo(pos.x, pos.y - 4);
                        ctx.lineTo(pos.x + Math.cos(ra) * 16 * aRatio, pos.y - 4 + Math.sin(ra) * 16 * aRatio);
                        ctx.stroke();
                    }
                    break;
                case 'mine':
                    // Coin toss
                    ctx.fillStyle = '#ffdd0088';
                    ctx.globalAlpha = aRatio;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y - 4 - 12 * aRatio, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                    break;
                case 'dragon':
                case 'hwaryong':
                    // Fire breath particles
                    ctx.globalAlpha = aRatio;
                    for (let fi = 0; fi < 3; fi++) {
                        let fx = pos.x + 10 + fi * 6 + Math.random() * 4;
                        let fy = pos.y - 4 + (Math.random() - 0.5) * 10;
                        ctx.fillStyle = fi === 0 ? '#ff2200' : fi === 1 ? '#ff6600' : '#ffaa00';
                        ctx.beginPath();
                        ctx.arc(fx, fy, 3 - fi * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1.0;
                    break;
            }
            ctx.restore();
        }

        // Grade display
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        let gradeY = pos.y + glowRadius * 0.6 + 2;
        if (isHidden) {
            ctx.fillStyle = t.def.color;
            ctx.font = 'bold 12px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('\u25C6 HIDDEN', pos.x, gradeY);
        } else {
            ctx.fillStyle = '#ffdd00';
            ctx.font = '10px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('\u2605'.repeat(t.grade), pos.x, gradeY);
        }
        // Level indicator
        if (t.level && t.level > 1) {
            ctx.fillStyle = '#00ff88';
            ctx.font = '9px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('Lv.' + t.level, pos.x, gradeY + 12);
        }

        // Tower name on select
        if (isSelected) {
            ctx.fillStyle = t.def.color;
            ctx.font = 'bold 11px DungGeunMo, Press Start 2P, monospace';
            ctx.textBaseline = 'bottom';
            ctx.fillText(t.def.name, pos.x, pos.y - glowRadius * 0.6 - 2);
            ctx.textBaseline = 'top';
        }
    }

    // Enemies
    for (let e of enemies) {
        let isBoss = e.type === 'boss';
        let size = isBoss ? 22 : (e.type === 'tank' ? 16 : (e.type === 'fast' ? 10 : 12));

        // Glow
        ctx.beginPath();
        ctx.arc(e.x, e.y, size + 8, 0, Math.PI * 2);
        let eGrd = ctx.createRadialGradient(e.x, e.y, size, e.x, e.y, size + 8);
        eGrd.addColorStop(0, e.color + '33');
        eGrd.addColorStop(1, e.color + '00');
        ctx.fillStyle = eGrd;
        ctx.fill();

        ctx.save();
        ctx.translate(e.x, e.y);

        if (e.type === 'normal') {
            ctx.beginPath();
            ctx.arc(0, 2, size, 0, Math.PI, false);
            ctx.arc(0, 0, size, Math.PI, 0, false);
            ctx.closePath();
            ctx.fillStyle = e.color + '99';
            ctx.fill();
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.fillRect(-5, -3, 3, 4);
            ctx.fillRect(3, -3, 3, 4);
        } else if (e.type === 'fast') {
            ctx.beginPath();
            ctx.moveTo(size, 0);
            ctx.lineTo(-size*0.5, -size*0.7);
            ctx.lineTo(-size*0.2, 0);
            ctx.lineTo(-size*0.5, size*0.7);
            ctx.closePath();
            ctx.fillStyle = e.color + '99';
            ctx.fill();
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.strokeStyle = e.color + '44';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo(-size*0.5 - i*5, -4 + i*3);
                ctx.lineTo(-size*0.5 - i*5 - 8, -4 + i*3);
                ctx.stroke();
            }
        } else if (e.type === 'tank') {
            ctx.fillStyle = e.color + '77';
            let hw = size*0.8, hh = size*0.9;
            ctx.beginPath();
            ctx.moveTo(-hw, -hh);
            ctx.lineTo(hw, -hh);
            ctx.lineTo(hw*1.1, 0);
            ctx.lineTo(hw, hh);
            ctx.lineTo(-hw, hh);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.strokeStyle = e.color + 'aa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -hh*0.5); ctx.lineTo(0, hh*0.5);
            ctx.moveTo(-hw*0.5, 0); ctx.lineTo(hw*0.5, 0);
            ctx.stroke();
        } else if (isBoss) {
            ctx.beginPath();
            ctx.arc(0, 3, size*0.7, 0, Math.PI * 2);
            ctx.fillStyle = e.color + '88';
            ctx.fill();
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-size*0.7, -size*0.2);
            ctx.lineTo(-size*0.7, -size*0.8);
            ctx.lineTo(-size*0.35, -size*0.5);
            ctx.lineTo(0, -size*0.9);
            ctx.lineTo(size*0.35, -size*0.5);
            ctx.lineTo(size*0.7, -size*0.8);
            ctx.lineTo(size*0.7, -size*0.2);
            ctx.closePath();
            ctx.fillStyle = e.color + 'cc';
            ctx.fill();
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, -size*0.55, 3, 0, Math.PI*2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(-6, 0, 4, 5);
            ctx.fillRect(3, 0, 4, 5);
        }

        ctx.restore();

        // Slow indicator
        if (e.slowTimer > 0) {
            ctx.strokeStyle = '#88ccff';
            ctx.lineWidth = 2;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.arc(e.x, e.y, size + 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // HP bar
        let barW = isBoss ? 40 : 28, barH = isBoss ? 5 : 3;
        let hpRatio = e.hp / e.maxHp;
        ctx.fillStyle = '#222';
        ctx.fillRect(e.x - barW/2, e.y - size - 12, barW, barH);
        let hpColor = hpRatio > 0.5 ? '#00ff00' : hpRatio > 0.25 ? '#ffff00' : '#ff0000';
        ctx.fillStyle = hpColor;
        ctx.fillRect(e.x - barW/2, e.y - size - 12, barW * hpRatio, barH);
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(e.x - barW/2, e.y - size - 12, barW, barH);

        // (enemies now only move left to right, no laps display needed)
    }

    // Lightning flashes (instant bolt effects)
    for (let lf of lightningFlashes) {
        let alpha = Math.min(1, lf.life / 0.06);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = lf.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = lf.color;
        ctx.shadowBlur = 15;
        // Draw zigzag bolt
        let ldx = lf.x2 - lf.x1, ldy = lf.y2 - lf.y1;
        let ldist = Math.hypot(ldx, ldy) || 1;
        let segments = 6;
        ctx.beginPath();
        ctx.moveTo(lf.x1, lf.y1);
        for (let si = 1; si < segments; si++) {
            let t2 = si / segments;
            let mx2 = lf.x1 + ldx * t2 + (Math.random() - 0.5) * 20;
            let my2 = lf.y1 + ldy * t2 + (Math.random() - 0.5) * 20;
            ctx.lineTo(mx2, my2);
        }
        ctx.lineTo(lf.x2, lf.y2);
        ctx.stroke();
        // Secondary thinner bolt
        ctx.lineWidth = 1;
        ctx.globalAlpha = alpha * 0.5;
        ctx.beginPath();
        ctx.moveTo(lf.x1, lf.y1);
        for (let si = 1; si < segments; si++) {
            let t2 = si / segments;
            ctx.lineTo(lf.x1 + ldx * t2 + (Math.random() - 0.5) * 30, lf.y1 + ldy * t2 + (Math.random() - 0.5) * 30);
        }
        ctx.lineTo(lf.x2, lf.y2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // Projectiles - unique per tower type
    for (let p of projectiles) {
        let pdx = p.tx - p.x, pdy = p.ty - p.y;
        let pd = Math.hypot(pdx, pdy) || 1;
        let angle = Math.atan2(pdy, pdx);

        ctx.save();
        switch(p.towerType) {
            case 'archer':
            case 'shingoong':
                // Cyan arrow / triangle
                ctx.translate(p.x, p.y);
                ctx.rotate(angle);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.moveTo(6, 0);
                ctx.lineTo(-4, -3);
                ctx.lineTo(-2, 0);
                ctx.lineTo(-4, 3);
                ctx.closePath();
                ctx.fill();
                // Trail line
                ctx.strokeStyle = p.color + '66';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-2, 0);
                ctx.lineTo(-12, 0);
                ctx.stroke();
                break;
            case 'blade':
                // Silver slash arc
                ctx.translate(p.x, p.y);
                ctx.rotate(angle);
                ctx.strokeStyle = '#ccccee';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 8, -0.8, 0.8);
                ctx.stroke();
                ctx.strokeStyle = '#ffffff44';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, 10, -0.6, 0.6);
                ctx.stroke();
                break;
            case 'gunner':
            case 'geumgang':
                // Small orange bullets
                ctx.fillStyle = '#ff9900';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc44';
                ctx.beginPath();
                ctx.arc(p.x + Math.cos(angle + 0.3) * 4, p.y + Math.sin(angle + 0.3) * 4, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x + Math.cos(angle - 0.3) * 4, p.y + Math.sin(angle - 0.3) * 4, 1.5, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'mage':
            case 'yuryeong':
                // Magenta energy orb with trail
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // Trail
                ctx.strokeStyle = p.color + '55';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - Math.cos(angle) * 14, p.y - Math.sin(angle) * 14);
                ctx.stroke();
                ctx.fillStyle = '#ffffff88';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'cannon':
                // Large orange cannonball
                ctx.fillStyle = '#884400';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff8800';
                ctx.beginPath();
                ctx.arc(p.x - 1, p.y - 1, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc88';
                ctx.beginPath();
                ctx.arc(p.x - 2, p.y - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'frost':
            case 'bingpok':
                // Light blue crystal shard
                ctx.translate(p.x, p.y);
                ctx.rotate(angle + Date.now() / 200);
                ctx.fillStyle = '#88ccff';
                ctx.beginPath();
                ctx.moveTo(0, -5);
                ctx.lineTo(3, 0);
                ctx.lineTo(0, 5);
                ctx.lineTo(-3, 0);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#aaddff88';
                ctx.beginPath();
                ctx.moveTo(0, -3);
                ctx.lineTo(2, 0);
                ctx.lineTo(0, 3);
                ctx.lineTo(-2, 0);
                ctx.closePath();
                ctx.fill();
                break;
            case 'mine':
                // Gold coin spinning
                let coinPhase = Math.sin(Date.now() / 100);
                ctx.fillStyle = '#ffdd00';
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, 4 * Math.abs(coinPhase), 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#aa8800';
                ctx.lineWidth = 1;
                ctx.stroke();
                break;
            case 'dragon':
            case 'hwaryong':
                // Red fireball with flame trail
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ff2200';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff8800';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // Flame trail
                for (let fi = 1; fi <= 4; fi++) {
                    let fx = p.x - Math.cos(angle) * fi * 5 + (Math.random()-0.5) * 4;
                    let fy = p.y - Math.sin(angle) * fi * 5 + (Math.random()-0.5) * 4;
                    ctx.globalAlpha = 0.6 - fi * 0.12;
                    ctx.fillStyle = fi < 2 ? '#ff6600' : '#ff990066';
                    ctx.beginPath();
                    ctx.arc(fx, fy, 3 - fi * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
                break;
            default:
                // Default projectile
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - pdx/pd * 8, p.y - pdy/pd * 8);
                ctx.strokeStyle = p.color + '88';
                ctx.lineWidth = 2;
                ctx.stroke();
                break;
        }
        ctx.restore();
    }

    // Particles
    for (let p of particles) {
        let alpha = Math.max(0, p.life / p.maxLife);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }

    // Drag line
    if (dragFrom) {
        let fromPos = gridToWorld(dragFrom.x, dragFrom.y);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fromPos.x, fromPos.y);
        ctx.lineTo(mouseX, mouseY);
        ctx.stroke();
        ctx.setLineDash([]);

        let t = grid[dragFrom.x][dragFrom.y];
        if (t) {
            // Highlight target cell
            let hoverG = worldToGrid(mouseX, mouseY);
            if (hoverG && hoverG.y !== LANE_ROW && !(hoverG.x === dragFrom.x && hoverG.y === dragFrom.y)) {
                let hPos = gridToWorld(hoverG.x, hoverG.y);
                let hx = hPos.x - CELL_W/2, hy = hPos.y - CELL_H/2;
                let target = grid[hoverG.x][hoverG.y];
                if (!target) {
                    // Empty cell -> move indicator (green)
                    ctx.fillStyle = '#00ff0022';
                    ctx.fillRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                    ctx.fillStyle = '#00ff00';
                    ctx.font = '12px DungGeunMo, Press Start 2P, monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('\uC774\uB3D9', hPos.x, hPos.y);
                } else if (canMerge(t, target)) {
                    // Can merge -> merge indicator (yellow)
                    ctx.fillStyle = '#ffff0033';
                    ctx.fillRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '12px DungGeunMo, Press Start 2P, monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('\uD569\uC131', hPos.x, hPos.y);
                } else if (target) {
                    // Cannot merge -> red indicator
                    ctx.fillStyle = '#ff000022';
                    ctx.fillRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(hx+2, hy+2, CELL_W-4, CELL_H-4);
                }
            }

            // Ghost tower at cursor
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 20, 0, Math.PI * 2);
            ctx.fillStyle = t.def.color + '55';
            ctx.fill();
            ctx.strokeStyle = t.def.color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px DungGeunMo, Press Start 2P, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(t.def.name[0], mouseX, mouseY);
        }
    }

    // HUD
    ctx.font = 'bold 20px DungGeunMo, Press Start 2P, monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('\u2665 HP: ' + hp, 10, 30);
    ctx.fillStyle = '#00ffff';
    ctx.textAlign = 'center';
    let waveText;
    if (stageMode && currentStage) {
        waveText = currentStage.label + ' ' + (wave === 0 ? '준비' : wave + '/' + currentStage.waves) + (waveActive ? ' 🔥' : '');
    } else {
        waveText = wave === 0 ? '\uC900\uBE44 \uC911' : '\uC6E8\uC774\uBE0C ' + wave + (waveActive ? ' \uD83D\uDD25' : ' \u2713');
    }
    ctx.fillText(waveText, canvas.width / 2, 30);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffff00';
    ctx.fillText('\u26A1 \uC5D0\uB108\uC9C0: ' + sp, canvas.width - 10, 30);

    // Gold display (stage mode)
    if (stageMode) {
        ctx.font = '14px DungGeunMo, Press Start 2P, monospace';
        ctx.fillStyle = '#ffdd00';
        ctx.textAlign = 'right';
        ctx.fillText('💰 ' + saveData.gold, canvas.width - 10, 48);
    } else {
        // SP source indicator
        ctx.font = '12px DungGeunMo, Press Start 2P, monospace';
        ctx.fillStyle = '#888';
        ctx.textAlign = 'right';
        ctx.fillText('\uC801 \uCC98\uCE58 + \uC6E8\uC774\uBE0C \uBCF4\uC0C1', canvas.width - 10, 48);
    }

    // Multiplayer player names in HUD
    if (isMultiplayer) {
        ctx.font = '11px DungGeunMo, Press Start 2P, monospace';
        ctx.textAlign = 'left';
        let myRole = isHost ? '\uD638\uC2A4\uD2B8' : '\uAC8C\uC2A4\uD2B8';
        ctx.fillStyle = '#00ffff88';
        ctx.fillText(playerName + ' (' + myRole + ')', 10, 48);
        if (opponentName) {
            let oppRole = isHost ? '\uAC8C\uC2A4\uD2B8' : '\uD638\uC2A4\uD2B8';
            ctx.fillText('vs ' + opponentName + ' (' + oppRole + ')', 10, 62);
        }
    }

    // Wave phase timer display
    if (waveActive && stageMode) {
        ctx.font = '14px DungGeunMo, Press Start 2P, monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#88ccff';
        ctx.fillText('\u23F1 ' + Math.ceil(wavePhaseTimer) + '\uCD08', 10, 68);
    }

    // Overflow warning
    if (waveActive) {
        let enemyCount = enemies.length;
        if (enemyCount > 80) {
            ctx.font = 'bold 14px DungGeunMo, Press Start 2P, monospace';
            ctx.textAlign = 'left';
            if (enemyCount >= OVERFLOW_LIMIT) {
                ctx.fillStyle = '#ff0000';
                ctx.fillText('\uD83D\uDEA8 \uC801 \uACFC\uB2E4! ' + enemyCount + '/100 - HP \uAC10\uC18C \uC911!', 10, 86);
            } else {
                ctx.fillStyle = '#ffaa00';
                ctx.fillText('\u26A0 \uC801 ' + enemyCount + '/100', 10, 86);
            }
        }
    }

    // Equipped relics display in HUD (top-right area)
    if (stageMode) {
        let relicStartX = canvas.width - 200;
        let relicY = 58;
        ctx.font = '10px DungGeunMo, Press Start 2P, monospace';
        ctx.textAlign = 'center';
        for (let ri = 0; ri < 3; ri++) {
            let rx = relicStartX + ri * 62;
            let relicId = saveData.equippedRelics[ri];
            if (relicId) {
                let rd = getRelicDef(relicId);
                let rlvl = (saveData.relicLevels && saveData.relicLevels[relicId]) || 1;
                if (rd) {
                    ctx.fillStyle = '#1a1a4e';
                    ctx.fillRect(rx, relicY, 56, 20);
                    ctx.strokeStyle = '#ffdd0088';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(rx, relicY, 56, 20);
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillText(rd.icon + ' Lv.' + rlvl, rx + 28, relicY + 11);
                }
            } else {
                ctx.fillStyle = '#0d0d3588';
                ctx.fillRect(rx, relicY, 56, 20);
                ctx.strokeStyle = '#33335588';
                ctx.lineWidth = 1;
                ctx.strokeRect(rx, relicY, 56, 20);
                ctx.fillStyle = '#333';
                ctx.fillText('-', rx + 28, relicY + 11);
            }
        }
    }

    // Boss HP bar
    let boss = enemies.find(function(e) { return e.type === 'boss'; });
    if (boss) {
        let bw = 400, bh = 16;
        let bx = canvas.width / 2 - bw / 2, by = 50;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, bw, bh);
        let ratio = boss.hp / boss.maxHp;
        ctx.fillStyle = '#ffdd00';
        ctx.fillRect(bx, by, bw * ratio, bh);
        ctx.strokeStyle = '#ffdd00';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px DungGeunMo, Press Start 2P, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('\u2605 \uBCF4\uC2A4 \u2605', canvas.width / 2, by + 13);
    }

    // Tower info (selected)
    if (selectedCell) {
        let t = grid[selectedCell.x][selectedCell.y];
        if (t) {
            let ix = 10, iy = canvas.height - 155;
            ctx.fillStyle = '#0a0a2e';
            ctx.fillRect(ix, iy, 270, 145);
            ctx.strokeStyle = t.def.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(ix, iy, 270, 145);

            let roleNames = {PHYSICAL:'\uBB3C\uB9AC',MAGIC:'\uB9C8\uBC95',SPLASH:'\uBC94\uC704',SUPPORT:'\uC9C0\uC6D0',ECONOMY:'\uACBD\uC81C',SPECIAL:'\uD2B9\uC218',LEGENDARY:'\uC804\uC124',HIDDEN:'\uD788\uB4E0'};
            let effectNames = {slow:'\uAC10\uC18D',energy_drop:'\uC5D0\uB108\uC9C0 \uB4DC\uB86D',sp_gen:'\uC5D0\uB108\uC9C0 \uC0DD\uC0B0',dot:'\uC9C0\uC18D \uD53C\uD574',buff_damage:'\uACF5\uACA9\uB825 \uAC15\uD654',knockback:'\uBC00\uCE58\uAE30',pull:'\uB04C\uC5B4\uB2F9\uAE40',pierce:'\uAD00\uD1B5',freeze:'\uB3D9\uACB0',chain:'\uC5F0\uC1C4',stun:'\uC2A4\uD134',burn:'\uD654\uC0C1',curse:'\uC800\uC8FC'};

            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillStyle = t.def.color;
            ctx.font = 'bold 16px DungGeunMo, Press Start 2P, monospace';
            let gradeStr = t.def.hidden ? ' \u25C6' : ' ' + '\u2605'.repeat(t.grade);
            ctx.fillText(t.def.name + gradeStr, ix + 10, iy + 10);
            ctx.fillStyle = '#aaa';
            ctx.font = '13px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('\uC720\uD615: ' + (roleNames[t.def.role] || t.def.role), ix + 10, iy + 32);
            let tLvl = t.level || 1;
            let effDmg = t.def.hidden ? Math.round(t.def.dmg * (1 + (tLvl-1)*0.25)) : Math.round(t.def.dmg * Math.pow(1.5, t.grade - 1) * (1 + (tLvl-1)*0.25));
            let effSpd = t.def.hidden ? (t.def.spd * (1 + (tLvl-1)*0.15)).toFixed(1) : (t.def.spd * (1 + (t.grade - 1) * 0.1) * (1 + (tLvl-1)*0.15)).toFixed(1);
            let effRange = t.def.hidden ? Math.round(t.def.range * (1 + (tLvl-1)*0.10)) : Math.round(t.def.range * (1 + (t.grade-1)*0.05) * (1 + (tLvl-1)*0.10));
            ctx.fillText('\uACF5\uACA9\uB825: ' + effDmg + '  \uC18D\uB3C4: ' + effSpd + '/\uCD08', ix + 10, iy + 52);
            ctx.fillText('\uC0AC\uAC70\uB9AC: ' + effRange + '  \uB808\uBCA8: Lv.' + tLvl, ix + 10, iy + 72);
            if (t.def.effect) {
                let effName = effectNames[t.def.effect] || t.def.effect;
                let effDesc = '';
                if (t.def.effect === 'slow') effDesc = effName + ' ' + Math.round(t.def.effectVal * 100) + '%';
                else if (t.def.effect === 'energy_drop') effDesc = effName + ' ' + Math.round((t.def.effectVal + (t.grade-1)*0.05)*100) + '% \uD655\uB960';
                else if (t.def.effect === 'pierce') effDesc = effName + ' ' + t.def.effectVal + '\uB9C8\uB9AC';
                else if (t.def.effect === 'freeze') effDesc = effName + ' ' + t.def.effectVal + '\uCD08';
                else if (t.def.effect === 'chain') effDesc = effName + ' ' + t.def.effectVal + '\uB9C8\uB9AC';
                else if (t.def.effect === 'stun') effDesc = effName + ' ' + t.def.effectVal + '\uCD08';
                else if (t.def.effect === 'burn') effDesc = effName + ' \uCD08\uB2F9 ' + t.def.effectVal + ' \uB370\uBBF8\uC9C0';
                else if (t.def.effect === 'curse') effDesc = effName + ' \uBC1B\uB294 \uB370\uBBF8\uC9C0 +' + Math.round(t.def.effectVal*100) + '%';
                else effDesc = effName;
                ctx.fillText('\uD6A8\uACFC: ' + effDesc, ix + 10, iy + 92);
            }
            // 판매 버튼
            let sellRefund = Math.floor(SUMMON_COST * t.grade * 0.5 + getUpgradeCostSpent(t.level || 1) * 0.5);
            let btnX = ix + 10, btnY = iy + 112, btnW = 250, btnH = 24;
            ctx.fillStyle = '#442200';
            ctx.fillRect(btnX, btnY, btnW, btnH);
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 1;
            ctx.strokeRect(btnX, btnY, btnW, btnH);
            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 12px DungGeunMo, Press Start 2P, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('\uD310\uB9E4 (+' + sellRefund + ' \uC5D0\uB108\uC9C0)', btnX + btnW/2, btnY + btnH/2);
            // Store sell button bounds for click detection
            window._sellBtnBounds = {x: btnX, y: btnY, w: btnW, h: btnH, gx: selectedCell.x, gy: selectedCell.y};
        }
    }

    // ── Upgrade Popup Overlay ──
    if (upgradePopup) {
        let ut = grid[upgradePopup.gx] && grid[upgradePopup.gx][upgradePopup.gy];
        if (!ut) { closeUpgradePopup(); }
        else {
            // Dark overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Panel
            let pw = 300, ph = 260;
            let px = (canvas.width - pw) / 2, py = (canvas.height - ph) / 2;
            ctx.fillStyle = '#0a0a2e';
            ctx.fillRect(px, py, pw, ph);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, pw, ph);
            // Neon corner accents
            ctx.strokeStyle = '#00ffff66';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(px, py+15); ctx.lineTo(px, py); ctx.lineTo(px+15, py); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(px+pw-15, py); ctx.lineTo(px+pw, py); ctx.lineTo(px+pw, py+15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(px, py+ph-15); ctx.lineTo(px, py+ph); ctx.lineTo(px+15, py+ph); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(px+pw-15, py+ph); ctx.lineTo(px+pw, py+ph); ctx.lineTo(px+pw, py+ph-15); ctx.stroke();

            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            // Title
            let utLvl = ut.level || 1;
            let gradeStr2 = ut.def.hidden ? ' \u25C6' : ' ' + '\u2605'.repeat(ut.grade);
            ctx.fillStyle = ut.def.color;
            ctx.font = 'bold 16px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText(ut.def.name + gradeStr2, px + pw/2, py + 14);
            ctx.fillStyle = '#00ff88';
            ctx.font = '14px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('Lv.' + utLvl, px + pw/2, py + 34);

            // Current stats
            let curDmg = ut.def.hidden ? Math.round(ut.def.dmg * (1+(utLvl-1)*0.25)) : Math.round(ut.def.dmg * Math.pow(1.5, ut.grade-1) * (1+(utLvl-1)*0.25));
            let curSpd = ut.def.hidden ? (ut.def.spd * (1+(utLvl-1)*0.15)).toFixed(1) : (ut.def.spd * (1+(ut.grade-1)*0.1) * (1+(utLvl-1)*0.15)).toFixed(1);
            let curRange = ut.def.hidden ? Math.round(ut.def.range * (1+(utLvl-1)*0.10)) : Math.round(ut.def.range * (1+(ut.grade-1)*0.05) * (1+(utLvl-1)*0.10));

            ctx.textAlign = 'left';
            ctx.fillStyle = '#aaa';
            ctx.font = '12px DungGeunMo, Press Start 2P, monospace';
            ctx.fillText('\uACF5\uACA9\uB825: ' + curDmg, px + 16, py + 58);
            ctx.fillText('\uC18D\uB3C4: ' + curSpd + '/\uCD08', px + 16, py + 76);
            ctx.fillText('\uC0AC\uAC70\uB9AC: ' + curRange, px + 16, py + 94);

            if (utLvl < MAX_TOWER_LEVEL) {
                // Next level stats (with relic discount)
                let nLvl = utLvl + 1;
                let nxtDmg = ut.def.hidden ? Math.round(ut.def.dmg * (1+(nLvl-1)*0.25)) : Math.round(ut.def.dmg * Math.pow(1.5, ut.grade-1) * (1+(nLvl-1)*0.25));
                let nxtSpd = ut.def.hidden ? (ut.def.spd * (1+(nLvl-1)*0.15)).toFixed(1) : (ut.def.spd * (1+(ut.grade-1)*0.1) * (1+(nLvl-1)*0.15)).toFixed(1);
                let nxtRange = ut.def.hidden ? Math.round(ut.def.range * (1+(nLvl-1)*0.10)) : Math.round(ut.def.range * (1+(ut.grade-1)*0.05) * (1+(nLvl-1)*0.10));

                // Arrow and next values
                ctx.fillStyle = '#00ff88';
                ctx.textAlign = 'left';
                ctx.fillText('\u2192 ' + nxtDmg, px + 160, py + 58);
                ctx.fillText('\u2192 ' + nxtSpd + '/\uCD08', px + 160, py + 76);
                ctx.fillText('\u2192 ' + nxtRange, px + 160, py + 94);

                // Next level label
                ctx.textAlign = 'center';
                ctx.fillStyle = '#666';
                ctx.font = '11px DungGeunMo, Press Start 2P, monospace';
                ctx.fillText('\uD604\uC7AC Lv.' + utLvl + '  \u2192  Lv.' + nLvl, px + pw/2, py + 118);

                // Upgrade button
                let cost = getUpgradeCost(utLvl);
                let upgDiscountVal = getRelicBonus('upgDiscount');
                if (upgDiscountVal > 0) cost = Math.max(1, Math.floor(cost * (1 - upgDiscountVal)));
                let canAfford = sp >= cost;
                let ubX = px + 20, ubY = py + 142, ubW = pw - 40, ubH = 34;
                ctx.fillStyle = canAfford ? '#003322' : '#222222';
                ctx.fillRect(ubX, ubY, ubW, ubH);
                ctx.strokeStyle = canAfford ? '#00ff88' : '#555555';
                ctx.lineWidth = 2;
                ctx.strokeRect(ubX, ubY, ubW, ubH);
                ctx.fillStyle = canAfford ? '#00ff88' : '#666666';
                ctx.font = 'bold 14px DungGeunMo, Press Start 2P, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('\uC5C5\uADF8\uB808\uC774\uB4DC (' + cost + ' \uC5D0\uB108\uC9C0)', ubX + ubW/2, ubY + ubH/2);
                window._upgradeBtnBounds = { x: ubX, y: ubY, w: ubW, h: ubH, gx: upgradePopup.gx, gy: upgradePopup.gy };
            } else {
                // Max level message
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffdd00';
                ctx.font = 'bold 16px DungGeunMo, Press Start 2P, monospace';
                ctx.fillText('\u2605 \uCD5C\uB300 \uB808\uBCA8! \u2605', px + pw/2, py + 130);
                window._upgradeBtnBounds = null;
            }

            // Close button
            let cbX = px + 20, cbY = py + ph - 50, cbW = pw - 40, cbH = 30;
            ctx.fillStyle = '#1a1a4e';
            ctx.fillRect(cbX, cbY, cbW, cbH);
            ctx.strokeStyle = '#00ffff66';
            ctx.lineWidth = 1;
            ctx.strokeRect(cbX, cbY, cbW, cbH);
            ctx.fillStyle = '#00ffff';
            ctx.font = '13px DungGeunMo, Press Start 2P, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('\uB2EB\uAE30', cbX + cbW/2, cbY + cbH/2);
            window._upgradeCloseBtnBounds = { x: cbX, y: cbY, w: cbW, h: cbH };
        }
    }

    // Game Over
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff0044';
        ctx.font = 'bold 48px DungGeunMo, Press Start 2P, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\uAC8C\uC784 \uC624\uBC84', canvas.width / 2, canvas.height / 2 - 30);
        ctx.fillStyle = '#00ffff';
        ctx.font = '24px DungGeunMo, Press Start 2P, monospace';
        if (stageMode && currentStage) {
            ctx.fillText(currentStage.label + ' - 웨이브 ' + wave + '/' + currentStage.waves, canvas.width / 2, canvas.height / 2 + 20);
        } else {
            ctx.fillText('\uC6E8\uC774\uBE0C ' + wave + ' \uB3C4\uB2EC', canvas.width / 2, canvas.height / 2 + 20);
        }
        ctx.fillStyle = '#888';
        ctx.font = '16px DungGeunMo, Press Start 2P, monospace';
        if (stageMode) {
            ctx.fillText('R키로 재도전 · L키로 스테이지 선택', canvas.width / 2, canvas.height / 2 + 60);
        } else {
            ctx.fillText('R\uD0A4\uB85C \uB2E4\uC2DC \uC2DC\uC791 \u00B7 L\uD0A4\uB85C \uB85C\uBE44', canvas.width / 2, canvas.height / 2 + 60);
        }
    }
}

// ── Input ──
canvas.addEventListener('dblclick', function(e) {
    if (gameOver) return;
    if (upgradePopup) return;
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let g = worldToGrid(mx, my);
    if (!g || g.y === LANE_ROW || !grid[g.x][g.y]) return;
    showUpgradePopup(g.x, g.y);
});

canvas.addEventListener('mousedown', function(e) {
    if (gameOver) return;
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left, my = e.clientY - rect.top;

    // Upgrade popup click handling
    if (upgradePopup) {
        // Upgrade button
        if (window._upgradeBtnBounds) {
            let ub = window._upgradeBtnBounds;
            if (mx >= ub.x && mx <= ub.x + ub.w && my >= ub.y && my <= ub.y + ub.h) {
                if (isMultiplayer && !isHost) {
                    sendInput({ type: 'upgrade', pos: {x: ub.gx, y: ub.gy} });
                } else {
                    upgradeTower(ub.gx, ub.gy, 'P1');
                }
                // Keep popup open to show updated stats
                return;
            }
        }
        // Close button
        if (window._upgradeCloseBtnBounds) {
            let cb = window._upgradeCloseBtnBounds;
            if (mx >= cb.x && mx <= cb.x + cb.w && my >= cb.y && my <= cb.y + cb.h) {
                closeUpgradePopup();
                return;
            }
        }
        // Click outside popup closes it
        closeUpgradePopup();
        return;
    }

    // 판매 버튼 클릭 체크
    if (window._sellBtnBounds) {
        let sb = window._sellBtnBounds;
        if (mx >= sb.x && mx <= sb.x + sb.w && my >= sb.y && my <= sb.y + sb.h) {
            if (isMultiplayer && !isHost) {
                sendInput({ type: 'sell', pos: {x: sb.gx, y: sb.gy} });
            } else {
                sellTower(sb.gx, sb.gy, 'P1');
            }
            window._sellBtnBounds = null;
            return;
        }
    }

    let g = worldToGrid(mx, my);
    if (!g || g.y === LANE_ROW) { selectedCell = null; return; }
    if (grid[g.x][g.y]) {
        selectedCell = g;
        dragFrom = g;
    } else {
        selectedCell = null;
    }
});

canvas.addEventListener('mousemove', function(e) {
    let rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mouseup', function(e) {
    if (!dragFrom) return;
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let g = worldToGrid(mx, my);
    if (g && !(g.x === dragFrom.x && g.y === dragFrom.y) && g.y !== LANE_ROW) {
        if (grid[g.x] && grid[g.x][g.y]) {
            // Target cell has tower -> try merge
            let a = grid[dragFrom.x][dragFrom.y];
            let b = grid[g.x][g.y];
            if (isMultiplayer && !isHost) {
                sendInput({ type: 'mergeOrSwap', from: {x: dragFrom.x, y: dragFrom.y}, to: {x: g.x, y: g.y} });
                selectedCell = g;
            } else {
                if (doMergeForPlayer(dragFrom.x, dragFrom.y, g.x, g.y, 'P1')) {
                    selectedCell = g;
                } else if (a && b) {
                    // 합성 불가 → 위치 교환
                    swapTowers(dragFrom.x, dragFrom.y, g.x, g.y, 'P1');
                    selectedCell = g;
                }
            }
        } else if (!grid[g.x][g.y]) {
            // Target cell is empty -> move tower
            if (isMultiplayer && !isHost) {
                sendInput({ type: 'move', from: {x: dragFrom.x, y: dragFrom.y}, to: {x: g.x, y: g.y} });
            } else {
                moveTower(dragFrom.x, dragFrom.y, g.x, g.y, 'P1');
            }
            selectedCell = g;
        }
    }
    dragFrom = null;
});

document.addEventListener('keydown', function(e) {
    // Only handle keys if game area is visible
    if (document.getElementById('gameArea').style.display === 'none') return;

    if (e.key === 'r' || e.key === 'R') {
        if (gameOver) {
            if (stageMode && currentStage) {
                // Restart same stage
                startStage(currentStage.id);
            } else {
                // Legacy: Reset game
                gameOver = false;
                hp = 5; sp = 100; wave = 0; waveActive = false;
                enemies = []; projectiles = []; particles = [];
                enemiesToSpawn = []; selectedCell = null; bonusSP = 0;
                shownHints = new Set(); currentHint = '';
                initGrid();
            }
        }
    }
    if (e.key === 'l' || e.key === 'L') {
        if (gameOver) {
            if (stageMode) {
                // Go back to stage select
                document.getElementById('gameArea').style.display = 'none';
                resetGameState();
                showStageSelect();
            } else {
                // Go back to lobby
                if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
                if (peer) { peer.destroy(); peer = null; }
                conn = null;
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('lobby').style.display = 'flex';
                resetGameState();
                isMultiplayer = false;
                isHost = false;
                myReady = false;
                opponentReady = false;
                opponentConnected = false;
                opponentName = '';
                peerReady = false;
                showLobbyPhase('main');
            }
        }
    }
    if (e.key === ' ') { e.preventDefault(); summonTower(); }
    if (e.key === 'w' || e.key === 'W') startNextWave();
});

// ── Game Loop ──
function gameLoop(time) {
    if (!time) time = performance.now();

    // Only update/draw if game area is visible
    if (document.getElementById('gameArea').style.display === 'none') {
        lastTime = time;
        return;
    }

    let dt = Math.min((time - lastTime) / 1000, 0.05);
    if (dt <= 0) dt = 0.016;
    lastTime = time;
    update(dt);
    draw();

    // Hints
    checkHints();
    drawHints();
}

// ── Onboarding Hints ──
let hints = [
    { trigger: function() { return wave === 0 && sp >= 50 && !grid.flat().some(function(c){return c;}); }, msg: '\uD83D\uDCA1 Space\uD0A4 \uB610\uB294 \uC18C\uD658 \uBC84\uD2BC\uC73C\uB85C \uCCAB \uD0C0\uC6CC\uB97C \uC18C\uD658\uD558\uC138\uC694!' },
    { trigger: function() { return wave === 0 && grid.flat().filter(function(c){return c;}).length >= 2 && !waveActive; }, msg: '\uD83D\uDCA1 W\uD0A4 \uB610\uB294 \uC6E8\uC774\uBE0C \uC2DC\uC791 \uBC84\uD2BC\uC744 \uB20C\uB7EC \uC804\uD22C\uB97C \uC2DC\uC791\uD558\uC138\uC694!' },
    { trigger: function() { return grid.flat().filter(function(c){return c;}).length >= 4; }, msg: '\uD83D\uDCA1 \uAC19\uC740 \uD0C0\uC6CC\uB97C \uB4DC\uB798\uADF8\uD574\uC11C \uACA9\uCE58\uBA74 \uD569\uC131! \uAC19\uC740 \uC885\uB958 \uB4F1\uAE09 UP' },
    { trigger: function() { return grid.flat().filter(function(c){return c && c.grade === 3;}).length >= 1; }, msg: '\uD83D\uDCA1 \u26053 \uD0C0\uC6CC 2\uAC1C\uB85C \uD788\uB4E0 \uCE90\uB9AD\uD130 \uC870\uD569! \uC624\uB978\uCABD \uD328\uB110 \uD655\uC778' },
];
let shownHints = new Set();
let currentHint = '';

function checkHints() {
    for (let h of hints) {
        let key = h.msg;
        if (!shownHints.has(key) && h.trigger()) {
            shownHints.add(key);
            currentHint = h.msg;
            setTimeout(function() { if (currentHint === h.msg) currentHint = ''; }, 5000);
            return;
        }
    }
}

function drawHints() {
    if (currentHint && !gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.font = '15px DungGeunMo, Press Start 2P, monospace';
        let tw = ctx.measureText(currentHint).width;
        ctx.fillRect(canvas.width/2 - tw/2 - 16, canvas.height - 52, tw + 32, 36);
        ctx.strokeStyle = '#00ffff44';
        ctx.lineWidth = 1;
        ctx.strokeRect(canvas.width/2 - tw/2 - 16, canvas.height - 52, tw + 32, 36);
        ctx.fillStyle = '#00ffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(currentHint, canvas.width/2, canvas.height - 34);
    }
}

// ══════════════════════════════════════════════════════════
// CHIPTUNE BGM - Procedural Synthwave using Web Audio API
// ══════════════════════════════════════════════════════════

let bgmCtx = null;
let bgmPlaying = false;
let bgmMasterGain = null;
let bgmNodes = [];
let bgmStarted = false;

function initBGM() {
    if (bgmCtx) return;
    bgmCtx = new (window.AudioContext || window.webkitAudioContext)();

    bgmMasterGain = bgmCtx.createGain();
    bgmMasterGain.gain.value = 0.25;
    bgmMasterGain.connect(bgmCtx.destination);

    // Delay effect
    let delay = bgmCtx.createDelay(0.5);
    delay.delayTime.value = 0.375; // dotted eighth at 120 BPM
    let delayGain = bgmCtx.createGain();
    delayGain.gain.value = 0.25;
    delay.connect(delayGain);
    delayGain.connect(delay);
    delayGain.connect(bgmMasterGain);

    // Note frequencies (A minor pentatonic focus)
    let noteFreqs = {
        'A2': 110.00, 'C3': 130.81, 'D3': 146.83, 'E3': 164.81,
        'A3': 220.00, 'C4': 261.63, 'D4': 293.66, 'E4': 329.63,
        'G4': 392.00, 'A4': 440.00, 'C5': 523.25, 'D5': 587.33,
        'E5': 659.26, 'G5': 783.99, 'A5': 880.00
    };

    // BPM 120 = 0.5s per beat
    let bpm = 120;
    let beatLen = 60 / bpm;
    let barLen = beatLen * 4;
    let loopLen = barLen * 4; // 4-bar loop = 8 seconds

    function scheduleLoop() {
        if (!bgmPlaying) return;
        let now = bgmCtx.currentTime;

        // === BASS LINE (sawtooth through lowpass) ===
        let bassNotes = ['A2','A2','C3','C3','D3','D3','E3','E3',
                         'A2','A2','C3','C3','D3','D3','C3','C3'];
        for (let i = 0; i < bassNotes.length; i++) {
            let t = now + i * beatLen;
            let osc = bgmCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = noteFreqs[bassNotes[i]];
            let bassFilter = bgmCtx.createBiquadFilter();
            bassFilter.type = 'lowpass';
            bassFilter.frequency.value = 400;
            bassFilter.Q.value = 5;
            let bassGain = bgmCtx.createGain();
            bassGain.gain.setValueAtTime(0.18, t);
            bassGain.gain.linearRampToValueAtTime(0.12, t + beatLen * 0.8);
            bassGain.gain.linearRampToValueAtTime(0, t + beatLen * 0.95);
            osc.connect(bassFilter);
            bassFilter.connect(bassGain);
            bassGain.connect(bgmMasterGain);
            osc.start(t);
            osc.stop(t + beatLen);
            bgmNodes.push(osc);
        }

        // === LEAD ARPEGGIO (square wave) ===
        let arpNotes = ['A4','C5','E5','A5','G5','E5','C5','A4',
                        'A4','D5','E5','G5','E5','D5','C5','A4',
                        'C5','E5','G5','A5','G5','E5','D5','C5',
                        'A4','C5','D5','E5','D5','C5','A4','E4'];
        let arpBeat = beatLen / 2; // eighth notes
        for (let i = 0; i < arpNotes.length; i++) {
            let t = now + i * arpBeat;
            let osc = bgmCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.value = noteFreqs[arpNotes[i]];
            let arpGain = bgmCtx.createGain();
            arpGain.gain.setValueAtTime(0, t);
            arpGain.gain.linearRampToValueAtTime(0.06, t + 0.01);
            arpGain.gain.linearRampToValueAtTime(0.04, t + arpBeat * 0.6);
            arpGain.gain.linearRampToValueAtTime(0, t + arpBeat * 0.9);
            let arpFilter = bgmCtx.createBiquadFilter();
            arpFilter.type = 'lowpass';
            arpFilter.frequency.value = 2000;
            osc.connect(arpFilter);
            arpFilter.connect(arpGain);
            arpGain.connect(bgmMasterGain);
            arpGain.connect(delay);
            osc.start(t);
            osc.stop(t + arpBeat);
            bgmNodes.push(osc);
        }

        // === PERCUSSION (noise-based kicks and hi-hats) ===
        for (let i = 0; i < 16; i++) {
            let t = now + i * beatLen;
            // Kick on beats 0, 2 of each bar (every 2 beats)
            if (i % 2 === 0) {
                let kickOsc = bgmCtx.createOscillator();
                kickOsc.type = 'sine';
                kickOsc.frequency.setValueAtTime(150, t);
                kickOsc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
                let kickGain = bgmCtx.createGain();
                kickGain.gain.setValueAtTime(0.2, t);
                kickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                kickOsc.connect(kickGain);
                kickGain.connect(bgmMasterGain);
                kickOsc.start(t);
                kickOsc.stop(t + 0.2);
                bgmNodes.push(kickOsc);
            }
            // Hi-hat on every beat
            let bufSize = bgmCtx.sampleRate * 0.03;
            let noiseBuf = bgmCtx.createBuffer(1, bufSize, bgmCtx.sampleRate);
            let data = noiseBuf.getChannelData(0);
            for (let s = 0; s < bufSize; s++) data[s] = Math.random() * 2 - 1;
            let noise = bgmCtx.createBufferSource();
            noise.buffer = noiseBuf;
            let hhFilter = bgmCtx.createBiquadFilter();
            hhFilter.type = 'highpass';
            hhFilter.frequency.value = 8000;
            let hhGain = bgmCtx.createGain();
            let hhVol = (i % 2 === 0) ? 0.04 : 0.07;
            hhGain.gain.setValueAtTime(hhVol, t);
            hhGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            noise.connect(hhFilter);
            hhFilter.connect(hhGain);
            hhGain.connect(bgmMasterGain);
            noise.start(t);
            noise.stop(t + 0.06);
            bgmNodes.push(noise);

            // Snare on beats 1, 3 (offbeats)
            if (i % 2 === 1) {
                let snBufSize = bgmCtx.sampleRate * 0.08;
                let snBuf = bgmCtx.createBuffer(1, snBufSize, bgmCtx.sampleRate);
                let snData = snBuf.getChannelData(0);
                for (let s = 0; s < snBufSize; s++) snData[s] = Math.random() * 2 - 1;
                let snNoise = bgmCtx.createBufferSource();
                snNoise.buffer = snBuf;
                let snFilter = bgmCtx.createBiquadFilter();
                snFilter.type = 'bandpass';
                snFilter.frequency.value = 3000;
                snFilter.Q.value = 1;
                let snGain = bgmCtx.createGain();
                snGain.gain.setValueAtTime(0.08, t);
                snGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                snNoise.connect(snFilter);
                snFilter.connect(snGain);
                snGain.connect(bgmMasterGain);
                snNoise.start(t);
                snNoise.stop(t + 0.12);
                bgmNodes.push(snNoise);
            }
        }

        // Schedule next loop
        setTimeout(function() {
            // Cleanup old nodes
            bgmNodes = bgmNodes.filter(function(n) { try { return n.context.currentTime < now + loopLen + 1; } catch(e) { return false; } });
            scheduleLoop();
        }, (loopLen - 0.1) * 1000);
    }

    bgmPlaying = true;
    bgmStarted = true;
    scheduleLoop();
    document.getElementById('bgmBtn').textContent = '\uD83D\uDD0A';
    document.getElementById('bgmBtn').classList.add('active');
}

function toggleBGM() {
    if (!bgmStarted) {
        initBGM();
        return;
    }
    if (bgmPlaying) {
        bgmPlaying = false;
        if (bgmMasterGain) bgmMasterGain.gain.linearRampToValueAtTime(0, bgmCtx.currentTime + 0.3);
        document.getElementById('bgmBtn').textContent = '\uD83D\uDD07';
        document.getElementById('bgmBtn').classList.remove('active');
    } else {
        bgmPlaying = true;
        if (bgmMasterGain) bgmMasterGain.gain.linearRampToValueAtTime(0.25, bgmCtx.currentTime + 0.3);
        // Restart scheduling
        initBGM_restart();
        document.getElementById('bgmBtn').textContent = '\uD83D\uDD0A';
        document.getElementById('bgmBtn').classList.add('active');
    }
}

function initBGM_restart() {
    if (!bgmCtx || !bgmPlaying) return;
    bgmMasterGain.gain.setValueAtTime(0.25, bgmCtx.currentTime);
    // The scheduling loop checks bgmPlaying, so we reinitialize
    let bpm = 120;
    let beatLen = 60 / bpm;

        'G4': 392.00, 'A4': 440.00, 'C5': 523.25, 'D5': 587.33,
        'E5': 659.26, 'G5': 783.99, 'A5': 880.00
    };

    let delay = bgmCtx.createDelay(0.5);
    delay.delayTime.value = 0.375;
    let delayGain = bgmCtx.createGain();
    delayGain.gain.value = 0.25;
    delay.connect(delayGain);
    delayGain.connect(delay);
    delayGain.connect(bgmMasterGain);

    function scheduleLoop() {
        if (!bgmPlaying) return;
        let now = bgmCtx.currentTime;

        let bassNotes = ['A2','A2','C3','C3','D3','D3','E3','E3',
                         'A2','A2','C3','C3','D3','D3','C3','C3'];
        for (let i = 0; i < bassNotes.length; i++) {
            let t = now + i * beatLen;
            let osc = bgmCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = noteFreqs[bassNotes[i]];
            let bassFilter = bgmCtx.createBiquadFilter();
            bassFilter.type = 'lowpass';
            bassFilter.frequency.value = 400;
            bassFilter.Q.value = 5;
            let bassGain = bgmCtx.createGain();
            bassGain.gain.setValueAtTime(0.18, t);
            bassGain.gain.linearRampToValueAtTime(0.12, t + beatLen * 0.8);
            bassGain.gain.linearRampToValueAtTime(0, t + beatLen * 0.95);
            osc.connect(bassFilter);
            bassFilter.connect(bassGain);
            bassGain.connect(bgmMasterGain);
            osc.start(t);
            osc.stop(t + beatLen);
            bgmNodes.push(osc);
        }

        let arpNotes = ['A4','C5','E5','A5','G5','E5','C5','A4',
                        'A4','D5','E5','G5','E5','D5','C5','A4',
                        'C5','E5','G5','A5','G5','E5','D5','C5',
                        'A4','C5','D5','E5','D5','C5','A4','E4'];
        let arpBeat = beatLen / 2;
        for (let i = 0; i < arpNotes.length; i++) {
            let t = now + i * arpBeat;
            let osc = bgmCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.value = noteFreqs[arpNotes[i]];
            let arpGain = bgmCtx.createGain();
            arpGain.gain.setValueAtTime(0, t);
            arpGain.gain.linearRampToValueAtTime(0.06, t + 0.01);
            arpGain.gain.linearRampToValueAtTime(0.04, t + arpBeat * 0.6);
            arpGain.gain.linearRampToValueAtTime(0, t + arpBeat * 0.9);
            let arpFilter = bgmCtx.createBiquadFilter();
            arpFilter.type = 'lowpass';
            arpFilter.frequency.value = 2000;
            osc.connect(arpFilter);
            arpFilter.connect(arpGain);
            arpGain.connect(bgmMasterGain);
            arpGain.connect(delay);
            osc.start(t);
            osc.stop(t + arpBeat);
            bgmNodes.push(osc);
        }

        for (let i = 0; i < 16; i++) {
            let t = now + i * beatLen;
            if (i % 2 === 0) {
                let kickOsc = bgmCtx.createOscillator();
                kickOsc.type = 'sine';
                kickOsc.frequency.setValueAtTime(150, t);
                kickOsc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
                let kickGain = bgmCtx.createGain();
                kickGain.gain.setValueAtTime(0.2, t);
                kickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                kickOsc.connect(kickGain);
                kickGain.connect(bgmMasterGain);
                kickOsc.start(t);
                kickOsc.stop(t + 0.2);
                bgmNodes.push(kickOsc);
            }
            let bufSize = bgmCtx.sampleRate * 0.03;
            let noiseBuf = bgmCtx.createBuffer(1, bufSize, bgmCtx.sampleRate);
            let dd = noiseBuf.getChannelData(0);
            for (let s = 0; s < bufSize; s++) dd[s] = Math.random() * 2 - 1;
            let noise = bgmCtx.createBufferSource();
            noise.buffer = noiseBuf;
            let hhFilter = bgmCtx.createBiquadFilter();
            hhFilter.type = 'highpass';
            hhFilter.frequency.value = 8000;
            let hhGain = bgmCtx.createGain();
            let hhVol = (i % 2 === 0) ? 0.04 : 0.07;
            hhGain.gain.setValueAtTime(hhVol, t);
            hhGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            noise.connect(hhFilter);
            hhFilter.connect(hhGain);
            hhGain.connect(bgmMasterGain);
            noise.start(t);
            noise.stop(t + 0.06);
            bgmNodes.push(noise);
            if (i % 2 === 1) {
                let snBufSize = bgmCtx.sampleRate * 0.08;
                let snBuf = bgmCtx.createBuffer(1, snBufSize, bgmCtx.sampleRate);
                let snData = snBuf.getChannelData(0);
                for (let s = 0; s < snBufSize; s++) snData[s] = Math.random() * 2 - 1;
                let snNoise = bgmCtx.createBufferSource();
                snNoise.buffer = snBuf;
                let snFilter = bgmCtx.createBiquadFilter();
                snFilter.type = 'bandpass';
                snFilter.frequency.value = 3000;
                snFilter.Q.value = 1;
                let snGain = bgmCtx.createGain();
                snGain.gain.setValueAtTime(0.08, t);
                snGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                snNoise.connect(snFilter);
                snFilter.connect(snGain);
                snGain.connect(bgmMasterGain);
                snNoise.start(t);
                snNoise.stop(t + 0.12);
                bgmNodes.push(snNoise);
            }
        }

        setTimeout(function() {
            bgmNodes = bgmNodes.filter(function(n) { try { return n.context.currentTime < now + loopLen + 1; } catch(e) { return false; } });
            scheduleLoop();
        }, (loopLen - 0.1) * 1000);
    }

    scheduleLoop();
}

// Auto-start BGM when game begins (not in lobby)
let _origStartMulti = startMultiplayerGame;
startMultiplayerGame = function() {
    _origStartMulti();
    if (!bgmStarted) initBGM();
};
let _origStartSolo = startSoloGame;
startSoloGame = function() {
    _origStartSolo();
    if (!bgmStarted) initBGM();
};

// 이벤트 위임: 조합 버튼 클릭 (data-recipe 속성 사용)
document.addEventListener('click', function(e) {
    let btn = e.target.closest('.combo-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    let idx = parseInt(btn.getAttribute('data-recipe'));
    if (!isNaN(idx)) {
        onComboClick(idx);
    }
});

// ── Start: show lobby + start game loop ──
// Load saved nickname
if (saveData.nickname && saveData.nickname !== '플레이어') {
    document.getElementById('nameInput').value = saveData.nickname;
}
showLobbyPhase('main');
lastTime = performance.now();
requestAnimationFrame(gameLoop);
// Fallback: if rAF doesn't fire (headless/background tab), use setInterval
setInterval(function() { gameLoop(performance.now()); }, 16);
</script>
